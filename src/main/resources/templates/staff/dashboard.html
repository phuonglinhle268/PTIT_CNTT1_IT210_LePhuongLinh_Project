<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quầy vé')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-wrap">

    <div class="page-header">
        <div>
            <div class="page-title">Quầy vé</div>
            <div class="page-subtitle"
                 th:text="'Xin chào, ' + ${session.LOGGED_IN_USER.fullname}"></div>
        </div>
    </div>

    <div style="max-width:560px;margin-bottom:2.5rem;">
        <div class="card">
            <div style="font-size:0.72rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:1.25rem;">
                Tra cứu đơn đặt vé
            </div>
            <div style="color:var(--text-2);font-size:0.875rem;margin-bottom:1.25rem;">
                Nhập mã đơn hàng để xác nhận thanh toán hoặc in vé giấy cho khách.
            </div>
            <form th:action="@{/staff/lookup}" method="get" style="display:flex;gap:0.75rem;">
                <input type="text" name="bookingCode" class="form-control"
                       placeholder="VD: BK20240101001"
                       style="flex:1;font-family:'DM Mono',monospace;letter-spacing:0.05em;"/>
                <button type="submit" class="btn btn-primary">Tra cứu</button>
            </form>
        </div>
    </div>

    <div style="font-size:0.72rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:1rem;">
        Truy cập nhanh
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:0.75rem;max-width:400px;">

        <a th:href="@{/staff/lookup}" class="card card-sm"
           style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:inherit;transition:border-color 0.15s;"
           onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
            <div style="font-size:1.5rem;">🔍</div>
            <div>
                <div style="font-weight:600;font-size:0.875rem;">Tra cứu vé</div>
                <div style="font-size:0.75rem;color:var(--text-3);">Theo mã đơn hàng</div>
            </div>
        </a>

        <a th:href="@{/profile}" class="card card-sm"
           style="display:flex;align-items:center;gap:0.75rem;text-decoration:none;color:inherit;transition:border-color 0.15s;"
           onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--border)'">
            <div style="font-size:1.5rem;">👤</div>
            <div>
                <div style="font-weight:600;font-size:0.875rem;">Hồ sơ</div>
                <div style="font-size:0.75rem;color:var(--text-3);">Tài khoản của tôi</div>
            </div>
        </a>

    </div>

</div>
</body>
</html>
