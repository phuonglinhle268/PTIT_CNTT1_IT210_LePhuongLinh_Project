<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Không có quyền truy cập')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-wrap" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="card" style="text-align:center;max-width:440px;padding:3rem 2.5rem;">

        <div style="font-size:4rem;margin-bottom:1rem;">🔒</div>

        <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">
            Không có quyền truy cập
        </div>
        <div style="color:var(--text-2);font-size:0.9rem;margin-bottom:2rem;line-height:1.6;">
            Bạn không có quyền xem trang này.<br/>
            Vui lòng đăng nhập với tài khoản phù hợp.
        </div>

        <!-- Nút về trang chủ theo role -->
        <div style="display:flex;flex-direction:column;gap:0.75rem;">

            <th:block th:if="${session.LOGGED_IN_USER != null}">
                <a th:if="${session.LOGGED_IN_USER.role == 'ADMIN'}"
                   th:href="@{/admin/dashboard}" class="btn btn-primary" style="justify-content:center;">
                    Về trang Admin
                </a>
                <a th:if="${session.LOGGED_IN_USER.role == 'STAFF'}"
                   th:href="@{/staff/dashboard}" class="btn btn-primary" style="justify-content:center;">
                    Về trang Staff
                </a>
                <a th:if="${session.LOGGED_IN_USER.role == 'CUSTOMER'}"
                   th:href="@{/movies}" class="btn btn-primary" style="justify-content:center;">
                    Về trang phim
                </a>
            </th:block>

            <th:block th:unless="${session.LOGGED_IN_USER != null}">
                <a th:href="@{/auth/login}" class="btn btn-primary" style="justify-content:center;">
                    Đăng nhập
                </a>
            </th:block>

        </div>
    </div>
</div>
</body>
</html>
