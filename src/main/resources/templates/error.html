<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Đã có lỗi xảy ra')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-wrap" style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="card" style="text-align:center;max-width:440px;padding:3rem 2.5rem;">

        <div style="font-size:4rem;margin-bottom:1rem;">⚠️</div>

        <div style="font-size:1.5rem;font-weight:700;margin-bottom:0.5rem;">
            Đã có lỗi xảy ra
        </div>
        <div style="color:var(--text-2);font-size:0.9rem;margin-bottom:0.75rem;line-height:1.6;"
             th:text="${errorMsg} ?: 'Có lỗi không mong muốn. Vui lòng thử lại sau.'">
        </div>

        <div style="display:flex;gap:0.75rem;justify-content:center;margin-top:1.5rem;">
            <a href="javascript:history.back()" class="btn btn-ghost">← Quay lại</a>
            <a th:href="@{/movies}" class="btn btn-primary">Trang chủ</a>
        </div>

    </div>
</div>
</body>
</html>
