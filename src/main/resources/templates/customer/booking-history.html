<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Vé của tôi')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="main-wrap">

    <div class="page-header">
        <div>
            <div class="page-title">Vé của tôi</div>
            <div class="page-subtitle">Toàn bộ lịch sử đặt vé</div>
        </div>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

    <div th:if="${#lists.isEmpty(bookings)}"
         style="text-align:center;padding:4rem 2rem;color:var(--text-3);">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;">🎟️</div>
        <div>Bạn chưa có đơn đặt vé nào.</div>
        <a th:href="@{/movies}" class="btn btn-primary" style="display:inline-flex;margin-top:1rem;">
            Xem phim ngay
        </a>
    </div>

    <div style="display:flex;flex-direction:column;gap:0.75rem;">
        <a th:each="b : ${bookings}"
           th:href="@{/customer/bookings/{id}(id=${b.bookingId})}"
           style="text-decoration:none;color:inherit;">
            <div class="card"
                 style="display:grid;grid-template-columns:1fr auto;gap:1rem;align-items:center;transition:border-color 0.15s;"
                 onmouseover="this.style.borderColor='var(--border-hi)'"
                 onmouseout="this.style.borderColor='var(--border)'">
                <div>
                    <!--
                        Dùng getBookingHistory trả về booking không JOIN FETCH tickets.
                        Thymeleaf trigger lazy load khi render → cần @Transactional
                        hoặc spring.jpa.open-in-view=true (mặc định Spring Boot = true).
                        Nếu gặp LazyInitializationException: đảm bảo open-in-view=true
                        trong application.properties.
                    -->
                    <div style="font-weight:700;font-size:0.95rem;margin-bottom:0.3rem;"
                         th:text="${b.tickets != null and !b.tickets.empty}
                                  ? ${b.tickets[0].showtime.movie.title}
                                  : '(Không có thông tin phim)'">
                    </div>

                    <div th:if="${b.tickets != null and !b.tickets.empty}"
                         style="font-size:0.82rem;color:var(--text-2);margin-bottom:0.15rem;">
                        🕐 <span th:text="${#temporals.format(b.tickets[0].showtime.startTime,'HH:mm dd/MM/yyyy')}"></span>
                        · <span th:text="${b.tickets[0].showtime.room.roomName}"></span>
                    </div>

                    <div th:if="${b.tickets != null and !b.tickets.empty}"
                         style="font-size:0.82rem;color:var(--text-2);margin-bottom:0.25rem;">
                        💺
                        <span th:each="t,i : ${b.tickets}"
                              th:text="${t.seat.seatRow} + ${t.seat.seatNumber} + (${i.last} ? '' : ', ')"></span>
                        (<span th:text="${#lists.size(b.tickets)}"></span> ghế)
                    </div>

                    <div style="font-size:0.78rem;color:var(--text-3);">
                        Mã: <code style="color:var(--gold);" th:text="${b.bookingCode}"></code>
                        · <span th:text="${#temporals.format(b.bookingTime,'dd/MM/yyyy HH:mm')}"></span>
                    </div>
                </div>

                <div style="text-align:right;flex-shrink:0;">
                    <div style="font-weight:700;color:var(--gold);margin-bottom:0.5rem;"
                         th:text="${#numbers.formatDecimal(b.totalAmount,0,'COMMA',0,'POINT')} + ' ₫'"></div>

                    <!-- Booking status badge -->
                    <span class="badge"
                          th:classappend="${b.bookingStatus.name() == 'CONFIRMED'} ? 'badge-green' :
                                         (${b.bookingStatus.name() == 'CANCELLED'} ? 'badge-red'  : 'badge-gold')"
                          th:text="${b.bookingStatus.name() == 'CONFIRMED'} ? 'Đã xác nhận' :
                                   (${b.bookingStatus.name() == 'CANCELLED'} ? 'Đã hủy'      : 'Chờ thanh toán')">
                    </span>

                    <!-- Payment status badge (chỉ hiện khi thất bại để phân biệt) -->
                    <div th:if="${b.paymentStatus.name() == 'FAILED'}" style="margin-top:0.3rem;">
                        <span class="badge badge-red" style="font-size:0.68rem;">Thanh toán thất bại</span>
                    </div>
                    <div th:if="${b.paymentStatus.name() == 'REFUNDED'}" style="margin-top:0.3rem;">
                        <span class="badge badge-gray" style="font-size:0.68rem;">Đã hoàn tiền</span>
                    </div>

                    <div style="font-size:0.75rem;color:var(--text-3);margin-top:0.4rem;">Xem chi tiết →</div>
                </div>
            </div>
        </a>
    </div>

</div>
</body>
</html>
