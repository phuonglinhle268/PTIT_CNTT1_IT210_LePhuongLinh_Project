spring.application.name=Java_Web_Project


# thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# datasource

spring.datasource.url=jdbc:mysql://localhost:3306/java_web_project?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# c?u hýnh orm tÛn cßc c?t vÓ table
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl


# Ch?y data.sql m?i l?n kh?i ??ng ?? seed tÓi kho?n m?c ??nh
# INSERT IGNORE ??m b?o kh¶ng b? l?i n?u ?Ò c¾ s?n
spring.sql.init.mode=always

# Ph?i ?? defer-datasource-initialization=true khi d¨ng JPA + data.sql c¨ng nhau
# (JPA t?o b?ng tr??c, sau ?¾ data.sql m?i ch?y)
spring.jpa.defer-datasource-initialization=true



# Upload
spring.servlet.multipart.max-file-size=2MB
